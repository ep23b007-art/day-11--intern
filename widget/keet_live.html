<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TravelKeet — Keet Trip Planner</title>
<style>
  :root{
    --accent:#0E7C7B; --accent-dark:#0A5A59; --ink:#1A2B3C; --line:#D6DEE2;
    --mist:#EEF4F4; --panel:#F7F9F9; --amber:#E8A33D;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif; background:#E9EEEE;
       display:flex; justify-content:center; align-items:center; min-height:100vh; padding:16px;}
  .widget{width:400px; max-width:100%; height:640px; background:#fff; border-radius:18px;
          box-shadow:0 14px 34px -14px rgba(26,43,60,.35); display:flex; flex-direction:column; overflow:hidden;}
  .header{flex:0 0 auto; background:linear-gradient(135deg,#0A5A59 0%,#0E7C7B 100%);
          color:#fff; padding:14px 16px; display:flex; align-items:center; gap:10px;}
  .header .logo{width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.18);
          display:flex; align-items:center; justify-content:center; font-weight:700;}
  .header .sub{font-size:11.5px; opacity:.85;}
  .chat{flex:1; overflow-y:auto; padding:14px; background:var(--panel);
        display:flex; flex-direction:column; gap:10px;}
  .bubble{max-width:85%; padding:10px 13px; border-radius:11px; font-size:14px; line-height:1.45;
          white-space:pre-wrap; word-wrap:break-word;}
  .agent{background:#fff; color:var(--ink); border:1px solid #DCE6E6; align-self:flex-start;}
  .user{background:var(--ink); color:#fff; align-self:flex-end;}
  .card{align-self:stretch; background:#fff; border:1px solid var(--line); border-radius:14px;
        box-shadow:0 14px 34px -14px rgba(26,43,60,.22); overflow:hidden;}
  .sec{border-top:1px solid var(--line);}
  .sec:first-child{border-top:none;}
  .sec-h{display:flex; align-items:center; gap:9px; padding:11px 14px; font-size:13.5px;
         font-weight:600; color:var(--ink); background:var(--mist);}
  .sec-b{padding:10px 14px 13px; font-size:13px; line-height:1.5; color:var(--ink); white-space:pre-wrap;}
  .chips{flex:0 0 auto; display:flex; flex-wrap:wrap; gap:7px; padding:8px 14px;
         border-top:1px solid var(--line); background:#EEF3F3;}
  .chip{border:1px solid var(--line); background:#fff; border-radius:999px; padding:6px 12px;
        font-size:13px; color:var(--ink); cursor:pointer;}
  .chip:hover{border-color:var(--accent); color:var(--accent);}
  .composer{flex:0 0 auto; display:flex; gap:8px; align-items:center; padding:11px 12px;
            border-top:1px solid var(--line); background:var(--panel);}
  .composer input{flex:1; border:1px solid var(--line); border-radius:999px; padding:11px 15px;
                  font-size:14px; outline:none; color:var(--ink);}
  .composer button{width:42px; height:42px; flex:0 0 auto; border-radius:50%; border:none;
                   background:linear-gradient(135deg,#0A5A59,#0E7C7B); color:#fff; font-size:18px; cursor:pointer;}
  .composer button:disabled{background:#B7C4C4; cursor:default;}
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="logo">K</div>
    <div><div style="font-weight:600">Keet · TravelKeet</div>
    <div class="sub">AI campervan trip planner</div></div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="chips" id="chips"></div>
  <div class="composer">
    <input id="input" placeholder="Message Keet…">
    <button id="send" title="Send">→</button>
  </div>
</div>

<script>
const API_BASE = "http://localhost:8000";   // ← change to Railway URL when deployed
const SECTIONS = ["🗺️ Route","📅 Day-by-Day","🍽️ Food","🅿️ Parking","🦺 Safety","🚨 Emergency","⭐ Recommendation"];
const sessionId = "widget-" + Date.now();

const chat  = document.getElementById("chat");
const input = document.getElementById("input");
const send  = document.getElementById("send");
const chips = document.getElementById("chips");

function bubble(cls, text){
  const b = document.createElement("div");
  b.className = "bubble " + cls;
  b.textContent = text || "";
  chat.appendChild(b);
  chat.scrollTop = chat.scrollHeight;
  return b;
}

function parseItinerary(text){
  const out = {};
  for (let i = 0; i < SECTIONS.length; i++){
    const start = text.indexOf(SECTIONS[i]);
    if (start === -1) return null;                    // any section missing → not an itinerary
    const next = i+1 < SECTIONS.length ? text.indexOf(SECTIONS[i+1]) : text.length;
    out[SECTIONS[i]] = text.slice(start + SECTIONS[i].length, next).replace(/^:?\s*/,"").trim();
  }
  return out;
}

function renderCard(parsed, replaceEl){
  const card = document.createElement("div");
  card.className = "card";
  for (const s of SECTIONS){
    const sec = document.createElement("div"); sec.className = "sec";
    const h = document.createElement("div"); h.className = "sec-h"; h.textContent = s;
    const b = document.createElement("div"); b.className = "sec-b"; b.textContent = parsed[s];
    sec.appendChild(h); sec.appendChild(b); card.appendChild(sec);
  }
  replaceEl.replaceWith(card);
  chat.scrollTop = chat.scrollHeight;
}

async function sendUser(text){
  text = (text || "").trim();
  if (!text) return;
  input.value = "";
  chips.innerHTML = "";
  input.disabled = send.disabled = true;
  bubble("user", text);
  const agent = bubble("agent", "…");

  try{
    const res = await fetch(API_BASE + "/v1/chat/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sessionId, message: text })
    });
    if (!res.ok || !res.body) throw new Error("HTTP " + res.status);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "", full = "";

    while (true){
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const events = buffer.split("\n\n");
      buffer = events.pop();
      for (const evt of events){
        if (!evt.startsWith("data: ")) continue;
        const token = evt.slice(6);
        if (token === "[DONE]") { buffer = ""; break; }
        full += token.replaceAll("\\n", "\n");
        agent.textContent = full;                     // live typing effect
        chat.scrollTop = chat.scrollHeight;
      }
    }
    const parsed = parseItinerary(full);
    if (parsed) renderCard(parsed, agent);
  } catch (err){
    agent.textContent = "Hmm, I couldn't reach the trip planner. Is the server running? (" + err.message + ")";
  } finally {
    input.disabled = send.disabled = false;
    input.focus();
  }
}

send.onclick = () => sendUser(input.value);
input.onkeydown = e => { if (e.key === "Enter") sendUser(input.value); };

// greeting + quick chips (same spirit as the prototype)
bubble("agent", "Namaste — I'm Keet, your TravelKeet trip planner. Tell me about your road trip: where does it start, and where's it headed?");
for (const q of ["Plan a trip from Chennai to Goa", "Manali → Leh, 4 of us"]){
  const c = document.createElement("button");
  c.className = "chip"; c.textContent = q;
  c.onclick = () => sendUser(q);
  chips.appendChild(c);
}
</script>
</body>
</html>
